name: Check HH and Telegram access

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check HH.ru
        run: |
          curl -i -A "VacancyBot/0.1" \
            "https://api.hh.ru/vacancies?per_page=1&text=Python" \
            --max-time 15

      - name: Check Telegram
        run: |
          curl -i "https://api.telegram.org" --max-time 15
